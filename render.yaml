services:
  - type: web
    name: teamflow-lite
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: INITIAL_ADMIN_PASSWORD
        generateValue: true
    disk:
      name: teamflow-data
      mountPath: /var/data
      sizeGB: 1
